<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>타로 운명 계산기 - 성격/영혼/연도 카드 해석</title>
    <meta name="description" content="생년월일로 알아보는 나의 타로 성격카드와 영혼카드. 올해의 운세 흐름을 결정하는 연도카드까지 무료로 계산하고 상세한 해석을 확인하세요.">
    <meta name="keywords" content="타로계산기, 성격카드, 영혼카드, 연도카드, 타로수비학, 무료타로, 2026년운세">
    <meta property="og:title" content="🔮 나의 타로 운명 계산기">
    <meta property="og:description" content="당신의 성격과 영혼, 올해의 운세를 타로 상징으로 풀어드립니다.">
    <meta property="og:type" content="website">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(106, 13, 173, 0.1); width: 100%; max-width: 550px; text-align: center; }
        h2 { color: #6a0dad; margin-bottom: 1rem; font-size: 1.8rem; }
        p.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        label { display: block; text-align: left; margin-top: 15px; font-weight: 700; color: #444; font-size: 0.95rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #e0e0e0; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #6a0dad; outline: none; box-shadow: 0 0 0 3px rgba(106, 13, 173, 0.1); }
        
        .calc-btn { width: 100%; padding: 16px; margin: 20px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, #6a0dad, #9b59b6); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 15px rgba(106, 13, 173, 0.2); }
        .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(106, 13, 173, 0.3); }
        
        .result { margin-top: 30px; text-align: left; display: none; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-box { background: #fdfbff; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #f0e6ff; }
        .card-title { font-size: 1.15rem; font-weight: 800; color: #6a0dad; margin-bottom: 12px; display: block; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .card-desc { font-size: 1rem; color: #333; line-height: 1.8; }
        .highlight { color: #d35400; font-weight: 700; }
        
        /* 하단 유입 섹션 */
        .blog-section { margin-top: 40px; padding: 25px; border-top: 2px dashed #eee; text-align: center; background-color: #fafafa; border-radius: 20px; }
        .naver-btn { display: inline-block; background-color: #03c75a !important; color: white !important; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1rem; transition: 0.3s; cursor: pointer; }
        .naver-btn:hover { background-color: #02b350 !important; transform: scale(1.05); }
        
        .move-btn { 
            display: inline-block;
            margin-top: 20px; 
            background: white; 
            border: 1px solid #6a0dad; 
            color: #6a0dad !important; 
            padding: 10px 20px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            border-radius: 20px; 
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s; 
        }
        .move-btn:hover { background-color: #f6eeff; }
        .footer-note { font-size: 0.85rem; color: #999; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔮 타로 운명 계산기</h2>
    <p class="subtitle">생년월일로 나의 고유한 타로 에너지를 확인하세요.</p>
    
    <label>생년월일 (8자리)</label>
    <input type="number" id="birth" placeholder="예: 19900725">
    
    <label>운세를 볼 연도</label>
    <input type="number" id="year" value="2026">
    
    <button class="calc-btn" onclick="calculateTarot()">나의 타로 결과 보기</button>

    <div id="resultBox" class="result">
        <div class="card-box">
            <span class="card-title">✨ 성격카드 (외적 성향)</span>
            <div id="pDesc" class="card-desc"></div>
        </div>
        <div class="card-box">
            <span class="card-title">🧘 영혼카드 (내적 본질)</span>
            <div id="sDesc" class="card-desc"></div>
        </div>
        <div class="card-box">
            <span class="card-title" id="yearTitle">📅 연도카드</span>
            <div id="yDesc" class="card-desc"></div>
        </div>
        
        <div class="blog-section">
            <p style="font-size: 0.95rem; color: #555; margin-bottom: 15px;">🔮 더 자세한 카드 리딩과<br><b>매일 올라오는 운세</b>를 확인해 보세요!</p>
            <a href="https://blog.naver.com/symhp1130" target="_blank" class="naver-btn">네이버 블로그 이웃 맺기 💚</a>
            <br>
            <a href="https://symhpark-ctrl.github.io/numerology/" class="move-btn">
                ⬅️ 수비학 탄생수 계산기로 이동
            </a>
        </div>
        <p class="footer-note">* 수비학 기반 타로 해석이며 참고용으로 활용하세요.</p>
    </div>
</div>

<script>
    // 타로 데이터 생략 (동일함)
    const tarotDetails = {
        0: { name: "바보(The Fool)", p: "자유롭고 낙천적인 영혼의 소유자입니다. 틀에 얽매이지 않는 독특한 발상을 하며, 주변 사람들에게는 어디로 튈지 모르는 신선한 매력을 줍니다.", s: "순수한 호기심과 무한한 가능성이 본질입니다. 인생의 여정 자체를 즐기며, 새로운 경험을 두려워하지 않는 숙명을 가졌습니다.", y: "새로운 시작의 해입니다. 예기치 못한 변화가 기회가 될 수 있으니, 고정관념을 버리고 자유롭게 움직이세요." },
        1: { name: "마법사(The Magician)", p: "다재다능하고 창의력이 뛰어난 사람입니다. 탁월한 말솜씨와 설득력을 가졌으며, 어떤 상황에서도 필요한 도구를 찾아내는 유능한 캐릭터입니다.", s: "잠재된 아이디어를 현실로 구현하는 것이 영혼의 목적입니다. 스스로 삶의 창조주가 되어 세상을 변화시키고 싶어 합니다.", y: "능력을 맘껏 발휘하는 기회의 해입니다. 준비된 자원을 활용해 구체적인 성과를 내기 가장 좋은 시기입니다." },
        2: { name: "여사제(The High Priestess)", p: "직관적이고 신비로운 분위기를 가졌습니다. 겉으로는 조용해 보이지만 내면에는 방대한 지식과 진실을 꿰뚫는 통찰력을 숨기고 있는 사색가입니다.", s: "영적 진리와 깊은 지혜를 탐구하는 것이 본질입니다. 말보다 마음으로 느끼고, 혼자만의 시간에서 우주의 진리를 깨닫는 영혼입니다.", y: "내면의 성장이 중요한 시기입니다. 직관이 강화되는 해이므로, 외부의 목소리보다 자신의 내적 판단을 믿어야 합니다." },
        3: { name: "여황제(The Empress)", p: "풍요롭고 감성적인 에너지가 넘치는 사람입니다. 주변을 따뜻하게 돌보는 양육 능력이 좋으며, 아름다움과 예술을 사랑하는 로맨티스트입니다.", s: "무언가를 낳고 기르는 생산적 에너지가 본질입니다. 사랑을 통해 풍요를 창조하고 삶의 즐거움을 만끽하는 숙명을 가졌습니다.", y: "결실과 수확의 시기입니다. 창조적인 프로젝트나 인간관계에서 큰 기쁨을 얻게 되며 물질적 풍요가 따릅니다." },
        4: { name: "황제(The Emperor)", p: "책임감이 강하고 리더십이 뛰어납니다. 논리적이고 질서를 중시하며, 자신의 영역과 사람들을 지키려는 의지가 확고한 든든한 지도자 타입입니다.", s: "안정적인 기반을 구축하고 체계를 세우는 데 동기를 얻습니다. 권위와 질서를 통해 세상을 견고하게 만드는 힘을 추구합니다.", y: "구조를 세우고 목표를 달성하는 해입니다. 흔들림 없는 결단력이 필요하며, 리더십을 발휘할 때 성공이 뒤따릅니다." },
        5: { name: "교황(The Hierophant)", p: "전통적인 가치를 소중히 여기며 신념이 깊습니다. 조언자나 교육자 역할에 능하며, 사람들에게 신뢰를 주는 멘토 같은 매력이 있습니다.", s: "정신적 질서와 중재를 중시하는 영혼입니다. 지혜를 공유하고 공동체의 가교 역할을 하는 데서 깊은 만족을 느낍니다.", y: "소속감이 강조되고 중요한 배움을 얻는 해입니다. 귀인의 조언을 받거나, 반대로 누군가에게 길을 제시하는 시기입니다." },
        6: { name: "연인(The Lovers)", p: "조화와 소통을 최우선으로 생각합니다. 매력적인 성격으로 사람들과의 관계를 중요하게 여기며, 사랑과 아름다움에 민감한 로맨틱한 성향입니다.", s: "진정한 연결과 사랑을 추구하는 것이 영혼의 목적입니다. 중요한 선택의 순간마다 가슴이 시키는 길을 따라가는 숙명을 가졌습니다.", y: "선택의 해입니다. 사랑이나 파트너십에 중요한 변화가 생길 수 있으며, 가슴 뛰는 결정을 내려야 할 때입니다." },
        7: { name: "전차(The Chariot)", p: "강한 의지와 도전정신을 가졌습니다. 목표가 정해지면 뒤도 돌아보지 않고 돌진하는 추진력이 있으며, 경쟁에서 이기려는 투지가 강한 사람입니다.", s: "승리와 통제를 통해 자아를 실현하는 영혼입니다. 거친 환경 속에서도 방향을 잃지 않고 앞으로 나아가는 불굴의 에너지를 가졌습니다.", y: "거침없이 전진하는 해입니다. 돌파력이 상승하는 시기이므로 집중력을 발휘해 목표를 쟁취해야 합니다." },
        8: { name: "힘(Strength)", p: "겉모습은 온유하지만 내면은 누구보다 강한 사람입니다. 뛰어난 인내심과 자기통제력을 가졌으며, 부드러운 카리스마로 상황을 압도합니다.", s: "본능적인 욕망을 지혜로 다스리는 영혼입니다. 폭력이 아닌 인내와 사랑으로 상대를 굴복시키는 고귀한 힘을 추구합니다.", y: "감정 조절과 내면의 힘이 필요한 시기입니다. 끈기를 가지고 상황을 유연하게 대처할 때 최선의 결과가 나옵니다." },
        9: { name: "은둔자(The Hermit)", p: "사색적이고 독립적인 성향입니다. 군중 속에 있기보다 혼자만의 시간을 선호하며, 인생의 깊은 의미를 찾으려 노력하는 지혜로운 사람입니다.", s: "자아의 내면을 비추는 등불을 가진 영혼입니다. 고독 속에서 지혜를 깨닫고 다른 이들에게 영적인 길을 제시하는 숙명을 가졌습니다.", y: "자기 반성과 내적 성찰의 해입니다. 외부 활동보다 내면의 소리에 집중하며 앞으로의 방향을 재정립할 때입니다." },
        10: { name: "운명의 수레바퀴(Wheel of Fortune)", p: "변화와 기회에 민첩하게 반응합니다. 인생의 굴곡을 긍정적으로 받아들이며, 운명적인 흐름을 잘 타는 유연한 성격의 소유자입니다.", s: "순환하는 우주의 섭리를 이해하는 영혼입니다. 변화무쌍한 삶의 흐름 속에서 중심을 잡고 기회를 포착하는 에너지를 가졌습니다.", y: "인생의 큰 전환점이 찾아오는 해입니다. 예상치 못한 변화가 운을 가져다줄 것이니 흐름에 몸을 맡겨보세요." },
        11: { name: "정의(Justice)", p: "공정하고 논리적입니다. 감정에 휘둘리지 않고 균형 잡힌 판단을 내리려 노력하며, 정직과 원칙을 중시하는 올곧은 사람으로 비춰집니다.", s: "우주의 균형과 원인-결과의 법칙을 수호하는 영혼입니다. 옳고 그름을 명확히 판단하고 그에 따른 책임을 지는 숙명을 가졌습니다.", y: "결단과 책임의 해입니다. 과거의 행동에 대한 결과가 명확히 나타나며, 공정한 계약이나 법적 문제가 해결되기도 합니다." },
        12: { name: "행맨(The Hanged Man)", p: "독특한 시각을 가진 희생적이고 인내심 강한 사람입니다. 남들이 보지 못하는 이면을 보며, 때로는 멈춤을 통해 더 큰 것을 얻으려 노력합니다.", s: "관점의 전환을 통해 해탈에 이르는 영혼입니다. 멈춰 서서 기다리는 시간을 통해 세상을 다르게 보는 지혜를 터득하는 숙명을 가졌습니다.", y: "잠시 멈춰가는 시기입니다. 억지로 추진하기보다 상황을 관조하며 관점을 바꿔보세요. 기다림이 곧 성장이 됩니다." },
        13: { name: "죽음(Death)", p: "변화와 혁신에 두려움이 없습니다. 불필요한 것을 과감히 정리할 줄 아는 결단력이 있으며, 위기 속에서도 새로운 시작을 찾아내는 사람입니다.", s: "낡은 것을 보내고 새것을 받아들이는 '변용'의 영혼입니다. 인생의 매듭을 짓고 다시 태어나는 재생의 에너지를 가졌습니다.", y: "거대한 변화의 해입니다. 과거의 연결고리를 끊고 새로운 단계로 진입하게 되니, 비우는 것을 두려워하지 마세요." },
        14: { name: "절제(Temperance)", p: "조화와 절제를 중시하는 평화주의자입니다. 서로 다른 의견을 조율하는 중재 능력이 탁월하며, 중용을 지키며 삶의 균형을 잘 맞추는 사람입니다.", s: "이질적인 것들을 섞어 새로운 조화를 만드는 영혼입니다. 정서적 안정과 영적 소통을 통해 평화로운 상태를 유지하려 합니다.", y: "균형을 회복하는 시기입니다. 극단적인 선택보다 적절한 배합과 조율이 필요하며, 인간관계가 한층 편안해집니다." },
        15: { name: "악마(The Devil)", p: "매력적이고 카리스마가 넘칩니다. 물질적인 욕망과 성취욕이 강하며, 사람들을 끌어당기는 원초적이고 강력한 에너지를 내뿜는 사람입니다.", s: "물질 세계의 유혹과 속박을 경험하고 극복하는 영혼입니다. 자신의 그림자를 마주하고 그 속에서 진정한 자유를 찾는 숙명을 가졌습니다.", y: "욕망과 집착을 마주하는 해입니다. 무언가에 얽매여 있지는 않은지 살피고, 건강하지 못한 중독이나 관계에서 벗어나야 합니다." },
        16: { name: "탑(The Tower)", p: "기존의 틀을 깨는 개혁가적 성향입니다. 충격적인 변화나 위기 상황에서도 무너지지 않고 근본부터 다시 세우려는 강한 에너지를 가졌습니다.", s: "거짓된 자아를 무너뜨리고 진실을 드러내는 영혼입니다. 파괴를 통해 근본적인 깨달음을 얻고 다시 시작하는 숙명을 가졌습니다.", y: "갑작스러운 변화와 충격이 있을 수 있습니다. 하지만 이는 낡은 구조가 무너지는 과정이니, 새롭게 재정비할 기회로 삼으세요." },
        17: { name: "별(The Star)", p: "희망과 긍정의 에너지가 가득합니다. 영감이 풍부하고 꿈이 많으며, 사람들에게 위로와 영감을 주는 치유자 같은 매력을 가졌습니다.", s: "우주의 축복과 희망을 전하는 별 같은 영혼입니다. 영적 성장을 추구하며 자신의 순수한 본질을 세상에 드러내는 숙명을 가졌습니다.", y: "치유와 정화의 해입니다. 어둠이 지나가고 빛이 보이는 시기이니, 자신의 꿈을 구체화하고 영감을 따라 움직이세요." },
        18: { name: "달(The Moon)", p: "감수성이 예민하고 상상력이 풍부합니다. 무의식의 세계에 민감하며, 겉으로 드러나지 않는 이면의 감정을 잘 읽어내는 신비로운 성격입니다.", s: "혼란 속에서 길을 찾는 밤의 여행자 같은 영혼입니다. 두려움과 환상을 직시하고 진실에 다다가는 영적 탐구의 숙명을 가졌습니다.", y: "감정적인 혼란이 생길 수 있는 해입니다. 안개 속에 있는 듯 막막할 수 있으나, 진실을 파악하기 위해 내면을 깊이 들여다봐야 합니다." },
        19: { name: "태양(The Sun)", p: "밝고 낙천적이며 자신감이 넘칩니다. 주변 사람들에게 활력을 주는 태양 같은 존재로, 성공과 기쁨을 누리는 데 주저함이 없는 당당한 매력의 소유자입니다.", s: "기쁨과 생명력을 상징하는 영적인 아이입니다. 순수한 자존감을 회복하고 세상을 밝게 비추는 에너지를 가졌습니다.", y: "최고의 행운과 성공이 따르는 해입니다. 자존감이 상승하고 에너지가 넘치며, 모든 일이 명확해지고 활기를 띱니다." },
        20: { name: "심판(Judgment)", p: "판단력이 명확하고 부활의 에너지가 강합니다. 과거의 잘못을 바로잡고 새롭게 거듭나려는 의지가 강하며, 소명 의식을 가지고 행동하는 사람입니다.", s: "내면의 부름(소명)을 듣고 깨어나는 영혼입니다. 자아성찰을 통해 과거를 청산하고 영적인 부활을 경험하는 숙명을 가졌습니다.", y: "회복과 재탄생의 시기입니다. 잊고 있었던 소식이 오거나 과거의 노력이 결실을 맺으며, 새로운 자아로 각성하는 해입니다." },
        21: { name: "세계(The World)", p: "완성도 높고 균형 잡힌 성격입니다. 다양한 재능을 가졌으며 목표한 바를 끝까지 완수해내는 성취 지향적인 에너지가 강합니다.", s: "완성과 통합을 이루는 조화로운 영혼입니다. 하나의 주기를 성공적으로 마무리하고 우주와 하나가 되는 완벽함을 추구합니다.", y: "성취와 성공적인 마무리의 해입니다. 오랜 갈망이 실현되고 새로운 시작을 위한 완벽한 발판이 마련되는 시기입니다." }
    };

    function sumDigits(num) {
        return num.toString().split('').reduce((sum, digit) => sum + parseInt(digit), 0);
    }

    function reduceToTarot(num) {
        while (num > 21) { num = sumDigits(num); }
        return num;
    }

    function calculateTarot() {
        const birth = document.getElementById('birth').value;
        const targetYear = document.getElementById('year').value;

        if (birth.length !== 8) { alert("생년월일 8자리를 입력해주세요."); return; }

        let totalSum = sumDigits(birth);
        let pNum = reduceToTarot(totalSum);
        
        let sNum = totalSum;
        while (sNum > 9) { sNum = sumDigits(sNum); }

        let yearInput = targetYear + birth.substring(4); 
        let yNum = reduceToTarot(sumDigits(yearInput));

        document.getElementById('pDesc').innerHTML = `<span class="highlight">${tarotDetails[pNum].name}</span><br>${tarotDetails[pNum].p}`;
        document.getElementById('sDesc').innerHTML = `<span class="highlight">${tarotDetails[sNum].name}</span><br>${tarotDetails[sNum].s}`;
        document.getElementById('yearTitle').innerText = `📅 ${targetYear}년 연도카드`;
        document.getElementById('yDesc').innerHTML = `<span class="highlight">${tarotDetails[yNum].name}</span><br>${tarotDetails[yNum].y}`;

        document.getElementById('resultBox').style.display = 'block';
        window.scrollTo({ top: document.getElementById('resultBox').offsetTop - 50, behavior: 'smooth' });
    }
</script>
